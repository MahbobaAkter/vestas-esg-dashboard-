<!DOCTYPE html>
<html>
<head>
    <title>Vestas ESG Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }

        img {
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Vestas ESG Dashboard</h1>
</header>

<div class="container">

    <div class="card">
        <h2>About</h2>
        <p>This website shows ESG performance of Vestas.</p>
    </div>

    <div class="card">
        <h2>Dashboard</h2>
        <img src="dashboard.png">
    </div>

    <div class="card">
        <h2>KPI</h2>
        <ul>
            <li>CO₂ Reduction: 15%</li>
            <li>Renewable Energy: 95%</li>
            <li>Safety Index: 98%</li>
        </ul>
    </div>

</div>

</body>
</html>
